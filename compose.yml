services:
  redis:
    image: redis:7-alpine
    container_name: devtools-redis
    platform: linux/amd64
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: devtools-postgres
    platform: linux/amd64
    environment:
      POSTGRES_DB: devtools
      POSTGRES_USER: devtools
      POSTGRES_PASSWORD: devtools_password
    ports:
      - "5544:5432"
    volumes:
      - devtools-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devtools -d devtools"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  devtools-postgres-data:
